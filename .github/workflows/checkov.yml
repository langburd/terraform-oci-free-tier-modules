---
name: checkov
on:
  pull_request:
    branches:
      - master
    paths:
      - 'oci/**'
permissions:
  contents: read
  security-events: write
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Find changed modules
        id: find
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_REF:-}" ]; then
            echo "BASE_REF is empty; cannot determine changed modules. Failing." >&2
            exit 1
          fi
          changed_files=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          modules=$(echo "$changed_files" \
            | grep '^oci/' \
            | cut -d'/' -f1-2 \
            | sort -u \
            | jq -R . \
            | jq -sc .)
          echo "modules=$modules" >> "$GITHUB_OUTPUT"
  checkov:
    needs: discover
    if: ${{ needs.discover.outputs.modules != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
      fail-fast: false
    name: checkov (${{ matrix.module }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Compute SARIF category
        id: meta
        env:
          MODULE: ${{ matrix.module }}
        run: |
          echo "category=checkov-$(echo "${MODULE}" | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - name: Run Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ matrix.module }}
          framework: terraform
          config_file: .checkov.yml
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
      - name: Upload Checkov SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: ${{ steps.meta.outputs.category }}
