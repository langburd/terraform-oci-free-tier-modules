---
name: pre-commit

on:
  pull_request:
    branches:
      - 'master'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Oracle Cloud Infrastructure CLI
        run: |
          mkdir -p /home/runner/.oci/
          echo "${{ secrets.OCI_API_KEY }}" > /home/runner/.oci/oci_api_key.pem
          echo "${{ secrets.OCI_CONFIG }}" > /home/runner/.oci/config
          chmod 600 /home/runner/.oci/oci_api_key.pem
          chmod 600 /home/runner/.oci/config

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install prerequisites (terraform-docs, tflint)
        env:
          TFDOCS_VERSION: "0.19.0"
          TFLINT_VERSION: "0.55.0"
        run: |
          set -euo pipefail

          # Install terraform-docs
          curl --fail -sL "https://github.com/terraform-docs/terraform-docs/releases/download/v${TFDOCS_VERSION}/terraform-docs-v${TFDOCS_VERSION}-linux-amd64.tar.gz" \
            -o /tmp/terraform-docs.tar.gz
          sudo tar -xzf /tmp/terraform-docs.tar.gz -C /usr/local/bin terraform-docs
          sudo chmod +x /usr/local/bin/terraform-docs

          # Install tflint
          curl --fail -sL "https://github.com/terraform-linters/tflint/releases/download/v${TFLINT_VERSION}/tflint_linux_amd64.zip" \
            -o /tmp/tflint.zip
          sudo unzip -o /tmp/tflint.zip -d /usr/local/bin tflint
          sudo chmod +x /usr/local/bin/tflint

      - name: Run pre-commit action
        uses: pre-commit/action@v3.0.1
