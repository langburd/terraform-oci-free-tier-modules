---
name: terraform-tests

on:
  pull_request:
    branches:
      - master
    paths:
      - 'oci/**'

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Find modules with tests
        id: find
        run: |
          set -euo pipefail
          modules=$(find oci -path '*/tests/*.tftest.hcl' -type f \
            | sed 's|/tests/[^/]*$||' \
            | sort -u \
            | jq -R . \
            | jq -sc .)
          echo "modules=$modules" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    if: ${{ needs.discover.outputs.modules != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
      fail-fast: false
    name: test (${{ matrix.module }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Set up stub OCI config
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config <<'EOF'
          [DEFAULT]
          user=ocid1.user.oc1..stub
          fingerprint=00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00
          tenancy=ocid1.tenancy.oc1..stub
          region=us-ashburn-1
          key_file=~/.oci/oci_api_key.pem
          EOF
          touch ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem

      - name: terraform init
        run: terraform init
        working-directory: ${{ matrix.module }}

      - name: terraform test
        run: terraform test
        working-directory: ${{ matrix.module }}
