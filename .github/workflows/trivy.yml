---
name: trivy
on:
  pull_request:
    branches:
      - master
    paths:
      - 'oci/**'
permissions:
  contents: read
  security-events: write
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Find changed modules
        id: find
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_REF:-}" ]; then
            echo "BASE_REF is empty; cannot determine changed modules. Failing." >&2
            exit 1
          fi
          changed_files=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          modules=$(echo "$changed_files" \
            | grep '^oci/' \
            | cut -d'/' -f1-2 \
            | sort -u \
            | jq -R . \
            | jq -sc .)
          echo "modules=$modules" >> "$GITHUB_OUTPUT"
  trivy:
    needs: discover
    if: ${{ needs.discover.outputs.modules != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
      fail-fast: false
    name: trivy (${{ matrix.module }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Compute SARIF category
        id: meta
        env:
          MODULE: ${{ matrix.module }}
        run: |
          echo "category=trivy-$(echo "${MODULE}" | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: ${{ matrix.module }}
          trivyignores: .trivyignore
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          severity: CRITICAL,HIGH,MEDIUM
      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: ${{ steps.meta.outputs.category }}
